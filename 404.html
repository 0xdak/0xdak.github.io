<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Ali Dak</title>
  <meta name="theme-color" content="#0a0a0a">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="shortcut icon" href="/assets/img/favicons/favicon.ico">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #0a0a0a;
      color: #e5e5e5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .code {
      font-size: 6rem;
      font-weight: 700;
      background: linear-gradient(135deg, #22d3ee, #818cf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
      margin-bottom: 1rem;
    }
    .message { color: #a3a3a3; font-size: 1.125rem; margin-bottom: 2rem; }
    .back {
      display: inline-block;
      color: #22d3ee;
      text-decoration: none;
      font-size: 0.875rem;
      font-weight: 500;
      padding: 0.625rem 1.5rem;
      border: 1px solid rgba(34,211,238,0.3);
      border-radius: 0.5rem;
      transition: all 0.2s;
    }
    .back:hover { background: rgba(34,211,238,0.1); border-color: rgba(34,211,238,0.5); }
  </style>
</head>
<body>
  <div>
    <div class="code">404</div>
    <p class="message">This page doesn't exist.</p>
    <a href="/" class="back">&larr; Back home</a>
  </div>
</body>
</html>
