  <style>
    :root {
      --bg: #f6f5f1;
      --surface: #fbfaf6;
      --ink: #141311;
      --ink-2: #3a3833;
      --ink-3: #78746b;
      --ink-4: #b5b0a4;
      --rule: #e5e1d6;
      --accent: oklch(48% 0.14 18);
      --accent-2: oklch(62% 0.18 18);
    }
    html[data-theme="dark"] {
      --bg: #0e0d0b;
      --surface: #16140f;
      --ink: #f3efe5;
      --ink-2: #c8c2b3;
      --ink-3: #8b8578;
      --ink-4: #55504a;
      --rule: #26231d;
      --accent: oklch(72% 0.17 18);
      --accent-2: oklch(80% 0.2 18);
    }
    *, *::before, *::after { box-sizing: border-box; }
    html { -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Geist', ui-sans-serif, system-ui, sans-serif;
      font-size: 15px;
      line-height: 1.55;
      color: var(--ink);
      background: var(--bg);
      background-image: radial-gradient(circle at 1px 1px, rgba(20,19,17,0.05) 1px, transparent 0);
      background-size: 28px 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 20px;
    }
    html[data-theme="dark"] body {
      background-image: radial-gradient(circle at 1px 1px, rgba(243,239,229,0.045) 1px, transparent 0);
    }
    ::selection { background: var(--accent); color: var(--bg); }
    a { color: inherit; text-decoration: none; }

    .serif { font-family: 'Instrument Serif', serif; }
    .mono  { font-family: 'JetBrains Mono', ui-monospace, monospace; }

    .card {
      width: 100%;
      max-width: 440px;
      background: var(--surface);
      border: 1px solid var(--rule);
      border-radius: 8px;
      padding: 36px 28px 28px;
      position: relative;
      box-shadow: 0 30px 80px -40px rgba(0,0,0,0.25);
    }

    .toolbar {
      position: absolute;
      top: 14px; right: 14px;
      display: flex; gap: 6px;
    }
    .icon-btn {
      background: transparent;
      border: 1px solid var(--rule);
      color: var(--ink-3);
      width: 32px; height: 32px;
      border-radius: 999px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10.5px;
      letter-spacing: 0.06em;
      transition: color .2s, border-color .2s, background .2s;
    }
    .icon-btn:hover { color: var(--ink); border-color: var(--ink); }
    .icon-btn svg { width: 14px; height: 14px; }

    .eyebrow {
      text-align: center;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10.5px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--accent);
      margin: 8px 0 14px;
    }
    h1 {
      font-family: 'Instrument Serif', serif;
      font-weight: 400;
      font-size: 52px;
      line-height: 1;
      letter-spacing: -0.02em;
      margin: 0 0 10px;
      text-align: center;
    }
    .title {
      text-align: center;
      color: var(--ink-2);
      font-size: 14px;
      margin: 0;
    }

    .divider {
      height: 1px;
      background: var(--rule);
      margin: 24px 0 20px;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .link-row {
      display: grid;
      grid-template-columns: 32px 1fr auto;
      align-items: center;
      gap: 14px;
      padding: 14px 6px;
      border-bottom: 1px solid var(--rule);
      transition: background .15s, padding .15s;
    }
    .link-row:last-child { border-bottom: 0; }
    .link-row:hover { background: rgba(0, 0, 0, 0.025); }
    html[data-theme="dark"] .link-row:hover { background: rgba(255, 255, 255, 0.03); }
    .link-row .icon {
      width: 32px; height: 32px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--ink-3);
    }
    .link-row .icon svg { width: 18px; height: 18px; }
    .link-row .label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10.5px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink-4);
      display: block;
      margin-bottom: 2px;
    }
    .link-row .value {
      font-size: 14.5px;
      color: var(--ink);
      word-break: break-all;
    }
    .link-row .go {
      color: var(--ink-4);
      transition: color .2s, transform .2s;
      font-size: 14px;
    }
    .link-row:hover .go { color: var(--accent); transform: translateX(2px); }

    .save-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      margin-top: 24px;
      padding: 14px 18px;
      background: var(--ink);
      color: var(--bg);
      border: 0;
      border-radius: 8px;
      cursor: pointer;
      font-family: 'Geist', sans-serif;
      font-size: 15px;
      font-weight: 500;
      transition: background .2s, transform .2s;
    }
    .save-btn:hover { background: var(--accent); transform: translateY(-1px); }
    .save-btn svg { width: 16px; height: 16px; }

    .footer-note {
      text-align: center;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--ink-4);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-top: 20px;
    }
    .footer-note a { color: var(--ink-3); }
    .footer-note a:hover { color: var(--accent); }

    /* Language toggle visibility */
    .lang-tr, .lang-en { display: none; }
    html[data-lang="tr"] .lang-tr { display: inline; }
    html[data-lang="en"] .lang-en { display: inline; }
    .block { display: none; }
    html[data-lang="tr"] .lang-tr.block { display: block; }
    html[data-lang="en"] .lang-en.block { display: block; }

    @media (max-width: 420px) {
      .card { padding: 32px 20px 20px; }
      h1 { font-size: 44px; }
    }
  </style>
</head>
<body>

      <span class="lang-en">Save to contacts</span>

  <script>
    /* ---------- Language ---------- */
    const html = document.documentElement;
    const browserTR = (navigator.language || '').toLowerCase().startsWith('tr');
    const savedLang = localStorage.getItem('cardLang');
    const params = new URLSearchParams(location.search);
    const urlLang = params.get('lang');
    const initialLang = urlLang || savedLang || (browserTR ? 'tr' : 'en');
    html.dataset.lang = initialLang === 'tr' ? 'tr' : 'en';

    document.getElementById('lang-btn').addEventListener('click', () => {
      const next = html.dataset.lang === 'tr' ? 'en' : 'tr';
      html.dataset.lang = next;
      localStorage.setItem('cardLang', next);
    });

    /* ---------- Theme ---------- */
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    const savedTheme = localStorage.getItem('theme');
    html.dataset.theme = savedTheme || (prefersDark ? 'dark' : 'light');
    document.getElementById('theme-btn').addEventListener('click', () => {
      const next = html.dataset.theme === 'dark' ? 'light' : 'dark';
      html.dataset.theme = next;
      localStorage.setItem('theme', next);
    });

    /* ---------- vCard download ---------- */
    document.getElementById('save-vcard').addEventListener('click', () => {
      const phone = document.getElementById('phone-value').textContent.trim().replace(/\s/g, '');
      const vcard = [
        'BEGIN:VCARD',
        'VERSION:3.0',
        'N:Dak;Ali;;;',
        'FN:Ali Dak',
        'ORG:vulntracker.io',
        'TITLE:Cybersecurity Entrepreneur',
        'TEL;TYPE=CELL:' + phone,
        'EMAIL:alidak583@gmail.com',
        'URL:https://vulntracker.io',
        'URL;TYPE=LinkedIn:https://www.linkedin.com/in/ali-dak',
        'URL;TYPE=Twitter:https://twitter.com/yuznumara_',
        'URL;TYPE=GitHub:https://github.com/0xdak',
        'END:VCARD'
      ].join('\r\n');

      const blob = new Blob([vcard], { type: 'text/vcard;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'ali-dak.vcf';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    });
  </script>
</body>
